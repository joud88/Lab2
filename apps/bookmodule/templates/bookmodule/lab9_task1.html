<!DOCTYPE html>
<html>
<head>
    <title>Lab 9 - Task 1</title>
</head>
<body>
    <h1>Books with Percentage Availability</h1>
    <table border="1">
        <tr>
            <th>Title</th>
            <th>Quantity</th>
            <th>Availability %</th>
        </tr>
        {% for book in books %}
        <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.quantity }}</td>
            <td>{{ book.percentage_availability }}%</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
