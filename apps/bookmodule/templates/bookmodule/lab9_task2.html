<!DOCTYPE html>
<html>
<head>
    <title>Lab 9 - Task 2</title>
</head>
<body>
    <h1>Publishers with Total Book Stock</h1>
    <table border="1">
        <tr>
            <th>Publisher</th>
            <th>Location</th>
            <th>Total Book Stock</th>
        </tr>
        {% for publisher in publishers %}
        <tr>
            <td>{{ publisher.name }}</td>
            <td>{{ publisher.location }}</td>
            <td>{{ publisher.total_book_stock }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
