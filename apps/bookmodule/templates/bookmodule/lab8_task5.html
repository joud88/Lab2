<!DOCTYPE html>

<body>
    <h1>Book Aggregation Statistics</h1>

    <table border="1" cellpadding="8">
        <tr>
            <th>Statistic</th>
            <th>Value</th>
        </tr>
        <tr>
            <td>Number of Books</td>
            <td>{{ stats.total_books }}</td>
