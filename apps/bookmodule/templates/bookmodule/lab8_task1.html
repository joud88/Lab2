<!DOCTYPE html>
<html>
<head>
    <title>Lab 8 - Task 1</title>
</head>
<body>
    <h1>Books with Price Less Than or Equal to 80</h1>

    {% if books %}
        <table border="1" cellpadding="8">
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Price</th>
                <th>Edition</th>
            </tr>
            {% for book in books %}
            <tr>
                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.price }}</td>
                <td>{{ book.edition }}</td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No books found.</p>
    {% endif %}
</body>
</html>
