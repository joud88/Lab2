<!DOCTYPE html>
<html>
<head>
    <title>Edit Book</title>
</head>
<body>

<h1>Edit Book - Part 1</h1>

<form method="post">
    {% csrf_token %}

    <label>Title:</label>
    <input type="text" name="title" value="{{ book.title }}">
    <br><br>

    <label>Price:</label>
    <input type="number" step="0.01" name="price" value="{{ book.price }}">
    <br><br>

    <label>Quantity:</label>
    <input type="number" name="quantity" value="{{ book.quantity }}">
    <br><br>

    <label>Publication Date:</label>
    <input type="datetime-local" name="pubdate" value="{{ book.pubdate|date:'Y-m-d\TH:i' }}">
    <br><br>

    <label>Rating:</label>
    <input type="number" name="rating" value="{{ book.rating }}">
    <br><br>

    <label>Publisher:</label>
    <select name="publisher">
        {% for publisher in publishers %}
            <option value="{{ publisher.id }}"
                {% if book.publisher and book.publisher.id == publisher.id %}selected{% endif %}>
                {{ publisher.name }}
            </option>
        {% endfor %}
    </select>
    <br><br>

    <label>Authors:</label>
    <br>
    {% for author in authors %}
        <input type="checkbox" name="authors" value="{{ author.id }}"
            {% if author in book.authors.all %}checked{% endif %}>
        {{ author.name }}
        <br>
    {% endfor %}

    <br>

    <button type="submit">Update Book</button>
</form>

<br>

<a href="{% url 'books:lab9_part1_listbooks' %}">Back to Books List</a>

</body>
</html>
